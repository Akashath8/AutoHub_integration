<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - AutoHub Marketplace</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-secondary);
            padding: 2rem;
        }

        .auth-wrapper {
            display: flex;
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--shadow-md);
            width: 100%;
            max-width: 1000px;
            min-height: 600px;
        }

        .auth-image {
            width: 50%;
            background: url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80') center/cover no-repeat;
            position: relative;
        }

        .auth-image::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 26, 46, 0.4);
        }

        .auth-form-side {
            width: 50%;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: var(--bg-primary);
            color: var(--text-main);
        }

        @media (max-width: 768px) {
            .auth-image {
                display: none;
            }

            .auth-form-side {
                width: 100%;
                padding: 2rem;
            }
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <div class="auth-wrapper">
            <!-- Left Side Image -->
            <div class="auth-image"></div>

            <!-- Right Side Form -->
            <div class="auth-form-side">
                <nav class="mb-4">
                    <span class="text-danger fw-bold">Business Registration ></span> <span class="fw-bold">Create New Account</span>
                </nav>

                <form id="registerForm">
                    <div class="row g-3">
                        <div class="col-12 mb-2">
                            <label class="form-label fw-bold">Role</label>
                            <select class="form-select" id="role" required>
                                <option value="" disabled selected>Select Business Role</option>
                                <option value="Buyer">Buyer (Purchasing Assets)</option>
                                <option value="Dealer">Dealer (Selling & Inventory Mgmt)</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Company Name</label>
                            <input type="text" class="form-control bg-theme-secondary text-main border-theme" id="companyName" placeholder="Enter company name"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Contact Person</label>
                            <input type="text" class="form-control bg-theme-secondary text-main border-theme" id="contactPerson" placeholder="Authorized person name"
                                required>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold">Email (Business ID)</label>
                            <input type="email" class="form-control bg-theme-secondary text-main border-theme" id="email" placeholder="name@company.com" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">GST / Tax ID</label>
                            <input type="text" class="form-control text-uppercase bg-theme-secondary text-main border-theme" id="gst"
                                placeholder="Enter GST Number" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Business Reg. No.</label>
                            <input type="text" class="form-control text-uppercase bg-theme-secondary text-main border-theme" id="regNo"
                                placeholder="CIN or Reg No." required>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold">Mobile</label>
                            <div class="input-group">
                                <span class="input-group-text bg-theme-secondary border-theme text-main border-end-0">🇮🇳 +91</span>
                                <input type="tel" class="form-control bg-theme-secondary text-main border-theme border-start-0" id="mobile"
                                    placeholder="00000 00000" required>
                                <button class="btn btn-primary" type="button">Send OTP</button>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-bold">Create Password</label>
                            <input type="password" class="form-control bg-theme-secondary text-main border-theme" id="password" placeholder="Enter password"
                                required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">Confirm Password</label>
                            <input type="password" class="form-control bg-theme-secondary text-main border-theme" id="confirmPassword"
                                placeholder="Re-enter password" required>
                        </div>

                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-secondary w-100 py-2">Create Account</button>
                        </div>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <span class="text-secondary">Already have an account? </span>
                    <a href="login.html" class="text-danger text-decoration-none fw-bold">Login</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
