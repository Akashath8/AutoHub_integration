<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Test Drives - AutoHub Marketplace</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Icon Font -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <style>
        .test-drive-card {
            border: 1px solid #eee;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .test-drive-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .status-badge.pending-confirmation {
            background-color: #fff3cd;
            color: #856404;
        }

        .status-badge.confirmed {
            background-color: #d1ecf1;
            color: #0c5460;
        }

        .status-badge.completed {
            background-color: #d4edda;
            color: #155724;
        }

        .status-badge.cancelled {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand" href="index.html">AutoHub <span class="text-accent">Marketplace</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-2 position-relative">
                        <a class="nav-link" href="cart.html">
                            <i class="fas fa-shopping-cart"></i>
                            <span
                                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                                id="cartCount">0</span>
                        </a>
                    </li>
                    <li class="nav-item ms-2" id="navProfileArea">
                        <!-- Handled by JS -->
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="fw-bold mb-4">My Test Drives</h2>

        <div class="row" id="testDrivesGrid">
            <!-- Dynamically populated -->
        </div>
    </div>

    <!-- Details Modal -->
    <div class="modal fade" id="tdDetailsModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 12px;">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold">Test Drive Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center mb-4">
                        <img src="" id="detailsImg" class="img-fluid rounded shadow-sm mb-3"
                            style="height: 180px; width: 100%; object-fit: cover;" alt="Car">
                        <h4 class="fw-bold mb-1" id="detailsName">Vehicle Name</h4>
                        <span class="badge status-badge" id="detailsStatusBadge">Status</span>
                    </div>

                    <div class="card border-0 bg-light mb-3">
                        <div class="card-body p-3">
                            <div class="row g-2">
                                <div class="col-6">
                                    <small class="text-muted d-block">Booking ID</small>
                                    <span class="fw-bold" id="detailsId"></span>
                                </div>
                                <div class="col-6">
                                    <small class="text-muted d-block">Scheduled Date</small>
                                    <span class="fw-bold" id="detailsDate"></span>
                                </div>
                                <div class="col-6">
                                    <small class="text-muted d-block">Time Slot</small>
                                    <span class="fw-bold" id="detailsSlot"></span>
                                </div>
                                <div class="col-6">
                                    <small class="text-muted d-block">Location</small>
                                    <span class="fw-bold" id="detailsLocation"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 mb-3" style="background:#f8f9fa;">
                        <div class="card-body p-3">
                            <h6 class="fw-bold mb-2">Dealer Details</h6>
                            <p class="mb-1 small"><i class="fas fa-store me-2 text-muted"></i> <span
                                    id="detailsSeller"></span></p>
                            <p class="mb-0 small"><i class="fas fa-phone-alt me-2 text-muted"></i> +91 98765 43210
                                (Support)</p>
                        </div>
                    </div>

                    <button class="btn btn-outline-danger w-100 fw-bold d-none" id="cancelTestDriveBtn">Cancel Test
                        Drive</button>
                    <p class="text-center text-muted small mt-2 d-none" id="cancelMsg">Note: Cancellation is only
                        available for pending requests.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/store.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = store.getUser();

            if (!user || !user.isLoggedIn) {
                window.location.href = 'index.html'; // Redirect to home if not logged in
                return;
            }

            // Setup Profile Area
            const profileArea = document.getElementById('navProfileArea');
            profileArea.innerHTML = `
                <div class="dropdown">
                    <a class="nav-link dropdown-toggle" href="#" id="profileDropdown" role="button" data-bs-toggle="dropdown">
                        <i class="fas fa-user-circle fa-lg text-primary"></i> <span class="fw-bold ms-1">${user.firstName}</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0" style="border-radius: 8px;">
                        ${user.role === 'Dealer' ? '<li><a class="dropdown-item py-2 fw-bold text-primary" href="dealer-dashboard.html"><i class="fas fa-tachometer-alt me-3 text-primary"></i>Dealer Dashboard</a></li>' : ''}
                        <li><a class="dropdown-item py-2" href="#"><i class="fas fa-user me-3 text-muted"></i>My Profile</a></li>
                        <li><a class="dropdown-item py-2" href="orders.html"><i class="fas fa-box me-3 text-muted"></i>My Orders</a></li>
                        <li><a class="dropdown-item py-2" href="my-quotes.html"><i class="fas fa-file-invoice me-3 text-muted"></i>My Quotations</a></li>
                        <li><a class="dropdown-item py-2 active bg-light text-dark fw-bold" href="my-test-drives.html"><i class="fas fa-car me-3 text-primary"></i>My Test Drives</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item py-2 text-danger" href="#" id="logoutBtn"><i class="fas fa-sign-out-alt me-3"></i>Logout</a></li>
                    </ul>
                </div>
            `;

            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                store.logoutUser();
                window.location.href = 'index.html';
            });

            document.getElementById('cartCount').textContent = store.getCart().items.length;

            const grid = document.getElementById('testDrivesGrid');
            const drives = store.getTestDrives();

            if (drives.length === 0) {
                grid.innerHTML = `
                    <div class="col-12 text-center py-5">
                        <i class="fas fa-calendar-times fa-4x text-muted mb-3 opacity-50"></i>
                        <h4 class="fw-bold text-muted">No Test Drives Booked</h4>
                        <p class="text-muted">You haven't scheduled any test drives yet.</p>
                        <a href="listing.html" class="btn btn-primary mt-2">Explore Vehicles</a>
                    </div>
                `;
                return;
            }

            function getStatusClass(status) {
                if (status === 'Pending Confirmation') return 'pending-confirmation';
                if (status === 'Confirmed') return 'confirmed';
                if (status === 'Completed') return 'completed';
                if (status === 'Cancelled') return 'cancelled';
                return 'bg-secondary';
            }

            function renderDrives() {
                grid.innerHTML = '';
                const currentDrives = store.getTestDrives();

                currentDrives.forEach(d => {
                    const driveDate = new Date(d.date).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

                    const card = `
                        <div class="col-md-6 col-lg-4 mb-4">
                            <div class="card test-drive-card bg-white h-100">
                                <div class="card-body p-0">
                                    <div class="d-flex align-items-center p-3 border-bottom">
                                        <div class="me-3">
                                            <img src="${d.vehicleImage}" class="rounded" style="width: 80px; height: 60px; object-fit: cover;">
                                        </div>
                                        <div>
                                            <h6 class="fw-bold mb-1 text-truncate" style="max-width:200px;">${d.vehicleName}</h6>
                                            <small class="text-muted"><i class="fas fa-id-badge me-1"></i> ${d.id}</small>
                                        </div>
                                    </div>
                                    <div class="p-3 bg-light">
                                        <div class="d-flex justify-content-between mb-2">
                                            <span class="small text-muted"><i class="far fa-calendar-alt me-1"></i> Date</span>
                                            <span class="small fw-bold">${driveDate}</span>
                                        </div>
                                        <div class="d-flex justify-content-between mb-2">
                                            <span class="small text-muted"><i class="far fa-clock me-1"></i> Slot</span>
                                            <span class="small fw-bold text-end" style="max-width: 150px;">${d.timeSlot}</span>
                                        </div>
                                        <div class="d-flex justify-content-between mb-3">
                                            <span class="small text-muted"><i class="fas fa-map-marker-alt me-1"></i> Hub</span>
                                            <span class="small fw-bold text-end text-truncate" style="max-width: 150px;">${d.location}</span>
                                        </div>
                                        
                                        <div class="d-flex justify-content-between align-items-center mb-1">
                                            <span class="badge status-badge ${getStatusClass(d.status)} px-3 py-2 rounded-pill">${d.status}</span>
                                            <button class="btn btn-sm btn-outline-primary fw-bold view-details-btn" data-id="${d.id}">View Details</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.insertAdjacentHTML('beforeend', card);
                });

                // Attach Handlers
                document.querySelectorAll('.view-details-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const drvId = e.target.dataset.id;
                        const data = store.getTestDrives().find(x => x.id === drvId);
                        if (!data) return;

                        document.getElementById('detailsImg').src = data.vehicleImage;
                        document.getElementById('detailsName').textContent = data.vehicleName;
                        document.getElementById('detailsId').textContent = data.id;
                        document.getElementById('detailsDate').textContent = new Date(data.date).toLocaleDateString('en-GB');
                        document.getElementById('detailsSlot').textContent = data.timeSlot;
                        document.getElementById('detailsLocation').textContent = data.location;
                        document.getElementById('detailsSeller').textContent = data.sellerContact;

                        const badge = document.getElementById('detailsStatusBadge');
                        badge.textContent = data.status;
                        badge.className = `badge status-badge ${getStatusClass(data.status)} px-3 py-2 rounded-pill mt-2 fs-6`;

                        const cancelBtn = document.getElementById('cancelTestDriveBtn');
                        const cancelMsg = document.getElementById('cancelMsg');

                        if (data.status === 'Pending Confirmation') {
                            cancelBtn.classList.remove('d-none');
                            cancelMsg.classList.remove('d-none');
                            cancelBtn.onclick = () => {
                                if (confirm("Are you sure you want to cancel this test drive?")) {
                                    store.updateTestDriveStatus(data.id, 'Cancelled');
                                    bootstrap.Modal.getInstance(document.getElementById('tdDetailsModal')).hide();
                                    renderDrives(); // re-render
                                }
                            };
                        } else {
                            cancelBtn.classList.add('d-none');
                            cancelMsg.classList.add('d-none');
                        }

                        new bootstrap.Modal(document.getElementById('tdDetailsModal')).show();
                    });
                });
            }

            renderDrives();
        });
    </script>
</body>

</html>
