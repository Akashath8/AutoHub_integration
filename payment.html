<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Options - AutoHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .payment-card {
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .payment-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .payment-card.selected {
            border-color: var(--primary-color);
            background-color: var(--bg-primary);
        }

        .trust-badge {
            position: absolute;
            top: 15px;
            right: 15px;
        }
    </style>
</head>

<body class="bg-theme-secondary text-main">

    <!-- Navbar Simplified -->
    <nav class="navbar navbar-expand-lg bg-theme-primary border-bottom border-theme">
        <div class="container">
            <a class="navbar-brand text-main" href="index.html">AutoHub <span class="text-accent">Marketplace</span></a>
        </div>
    </nav>

    <div class="container py-5">
        <h3 class="mb-4 text-center text-main">Complete Transaction Payment</h3>

        <div class="alert alert-info d-none mb-4 mx-auto" style="max-width: 800px;" id="escrowNotice">
            <!-- Notice removed based on user request to strip escrow wording -->
        </div>

        <div class="row justify-content-center g-4">

            <!-- Option 1: Settlement -->
            <div class="col-md-5">
                <div class="card payment-card bg-theme-primary border-theme h-100 p-4 text-center position-relative" onclick="selectOption('settlement')">
                    <div id="trustBadgeContainer"></div>
                    <div class="card-body">
                        <i id="settlementIcon" class="fas fa-university text-primary mb-3" style="font-size: 3rem;"></i>
                        <h4 id="settlementTitle" class="text-main">Pay</h4>
                        <p class="text-muted" id="settlementDesc">Direct payment to finalize transaction.</p>
                        <h5 class="text-danger fw-bold mt-3" id="totalAmountDisplay">₹ 0</h5>
                        <button class="btn btn-outline-primary mt-3 w-100">Proceed to Pay</button>
                    </div>
                </div>
            </div>

            <!-- Option 2: Finance -->
            <div class="col-md-5">
                <div class="card payment-card bg-theme-primary border-theme h-100 p-4 text-center" onclick="selectOption('finance')">
                    <div class="card-body">
                        <i class="fas fa-briefcase text-success mb-3" style="font-size: 3rem;"></i>
                        <h4 class="text-main">Apply for a loan</h4>
                        <p class="text-muted">Get B2B financing through our partner banks.</p>
                        <ul class="text-start small text-muted mt-3 mb-3">
                            <li><i class="fas fa-check text-success me-2"></i> High Credit Limits</li>
                            <li><i class="fas fa-check text-success me-2"></i> Flexible Repayment</li>
                            <li><i class="fas fa-check text-success me-2"></i> Digital Processing</li>
                        </ul>
                        <button class="btn btn-success mt-1 w-100">Apply for a loan</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Payment Processing Modal -->
    <div class="modal fade" id="processingModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-theme-primary border-theme text-center p-5">
                <div class="spinner-border text-primary mb-3" role="status" style="width: 3rem; height: 3rem;"></div>
                <h5>Processing Payment...</h5>
                <p class="text-muted">Please do not refresh the page.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/store.js"></script>
    <script src="js/data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const dealId = urlParams.get('dealId');
        const subId = urlParams.get('subId');

        let amountToPay = 0;
        let isTrustedDealer = false;
        let orderRef = null;
        let subOrderRef = null;

        if (dealId && subId) {
            const orders = store.getOrders() || [];
            orderRef = orders.find(o => o.id === dealId);
            if (orderRef) {
                subOrderRef = orderRef.subOrders.find(so => so.sub_order_id === subId);
                if (subOrderRef) {
                    amountToPay = subOrderRef.pending_downpayment || subOrderRef.seller_total || orderRef.total || 0;

                    // Update UI
                    document.getElementById('totalAmountDisplay').textContent = '₹ ' + amountToPay.toLocaleString('en-IN');
                }
            }
        } else {
            // Fallback for prototype testing if accessed directly without URL params
            amountToPay = 500000;
            orderRef = { id: 'DUMMY-ORDER' };
            subOrderRef = { sub_order_id: 'DUMMY-SUB' };
            document.getElementById('totalAmountDisplay').textContent = '₹ ' + amountToPay.toLocaleString('en-IN');
        }

        function selectOption(type) {
            if (!orderRef || !subOrderRef) {
                alert("Invalid transaction reference.");
                return;
            }

            if (type === 'settlement') {
                const modal = new bootstrap.Modal(document.getElementById('processingModal'));
                modal.show();

                setTimeout(() => {
            		// Safe mock routing logic for demo
                    const orders = store.getOrders() || [];
                    const orderToUpdate = orders.find(o => o.id === dealId);
                    if (orderToUpdate) {
                        const subToUpdate = orderToUpdate.subOrders?.find(so => so.sub_order_id === subId);

                        if (subToUpdate) {
                            subToUpdate.pending_downpayment = 0;
                            subToUpdate.payout_status = 'Payout Completed';
                            orderToUpdate.status = 'Deal Finalized - Processing Delivery';
                        }
                        store.saveOrders(orders);
                    }
                    window.location.href = 'orders.html';
                }, 2000);
            } else if (type === 'finance') {
                window.location.href = 'application.html';
            }
        }
    </script>
</body>

</html>
